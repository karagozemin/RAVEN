# Render blueprint for the RAVEN backend (SSE Control Room server).
#
# Deploy: push to GitHub, then in Render choose "New +" -> "Blueprint" and
# point it at this repo. Render reads this file and provisions the service.
#
# The backend serves the SSE /stream endpoint (long-lived connections), which
# is why it runs as a persistent web service rather than a serverless function.
services:
  - type: web
    name: raven-backend
    runtime: python
    plan: free
    # Render injects $PORT; raven.web binds 0.0.0.0:$PORT automatically.
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m raven.web"
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
